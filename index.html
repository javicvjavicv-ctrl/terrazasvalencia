<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Terrazas">
<meta name="theme-color" content="#4FA8D5">
<title>Terrazas Valencia</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --acc:#4FA8D5;--acc2:#6BBFE8;--sun:#F5C842;
  --bg:#08111A;--bg2:#0A1828;--bg3:#162C42;--card:#0F1E30;--card2:#132640;
  --text:#F4FAFF;--text2:#C8E4F4;--text3:#7BB8D4;
  --border:rgba(79,168,213,0.12);--border2:rgba(79,168,213,0.22);
  --green:#4DC98A;--red:#E06875;
  --nav-h:64px;--header-h:60px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#060E16}
body{font-family:'DM Sans',sans-serif;color:var(--text)}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg);position:relative}

.hdr{background:var(--card);height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.hdr-logo{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--acc2);display:flex;align-items:center;gap:8px}
.w-pill{display:flex;align-items:center;gap:6px;background:var(--bg3);border-radius:20px;padding:5px 12px;border:1px solid var(--border2);cursor:pointer;font-family:'DM Sans',sans-serif}
.w-pill .wi{font-size:18px}
.w-pill .wt{font-size:15px;font-weight:600;color:var(--text)}
.w-pill .wd{font-size:11px;color:var(--text3)}

.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
.screen.active{display:flex}

.nav{background:var(--card);height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);display:flex;align-items:center;border-top:1px solid var(--border);flex-shrink:0;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;cursor:pointer;padding:0;height:100%}
.nav-lbl{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.02em}
.nav-btn.active .nav-lbl{color:var(--acc2)}
.nav-ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.nav-ico svg{width:22px;height:22px;fill:none;stroke:var(--text3);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active .nav-ico svg{stroke:var(--acc2)}

.w-sheet-wrap{position:absolute;inset:0;z-index:50;pointer-events:none;display:flex;flex-direction:column}
.w-sheet-bg{flex:1;transition:background .25s}
.w-sheet{background:var(--card2);border-radius:24px 24px 0 0;padding:12px 16px 32px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.32,1);pointer-events:all;border-top:1px solid var(--border2)}
.w-sheet-wrap.open{pointer-events:all}
.w-sheet-wrap.open .w-sheet-bg{background:rgba(0,0,0,0.65)}
.w-sheet-wrap.open .w-sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 18px}
.w-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.w-cell{background:var(--bg3);border-radius:12px;padding:10px 12px;border:1px solid var(--border)}
.w-cell-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.w-cell-val{font-size:16px;font-weight:500;color:var(--text)}
.w-hero{display:flex;align-items:center;gap:14px;padding:4px 0 14px}
.w-hero-icon{font-size:54px;line-height:1}
.w-hero-desc{font-size:14px;color:var(--text2)}
.verdict-strip{border-radius:12px;padding:10px 14px;font-size:13px;font-weight:500;margin-top:4px}
.verdict-strip.buena{background:rgba(245,200,66,0.12);color:#F5D060;border:1px solid rgba(245,200,66,0.2)}
.verdict-strip.regular{background:rgba(79,168,213,0.12);color:var(--acc2);border:1px solid var(--border2)}
.verdict-strip.mala{background:rgba(80,100,120,0.2);color:var(--text2);border:1px solid rgba(100,140,170,0.15)}

.hero-banner{margin:12px 12px 0;border-radius:16px;padding:18px 16px;position:relative;overflow:hidden;flex-shrink:0;border:1px solid var(--border2)}
.hero-banner.sol{background:linear-gradient(135deg,rgba(245,200,66,0.14),rgba(232,168,74,0.08))}
.hero-banner.parcial{background:linear-gradient(135deg,rgba(79,168,213,0.14),rgba(50,120,180,0.08))}
.hero-banner.nubes,.hero-banner.lluvia{background:linear-gradient(135deg,rgba(30,70,110,0.3),rgba(20,50,80,0.2))}
.hb-title{font-family:'Fraunces',serif;font-size:21px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:4px}
.hb-sub{font-size:13px;color:var(--text2)}
.hb-temp{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-family:'Fraunces',serif;font-size:52px;font-weight:300;color:var(--text);line-height:1}
.hb-temp span{font-size:20px;color:var(--text3)}

.quick-filters{display:flex;gap:8px;padding:12px 12px 4px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.quick-filters::-webkit-scrollbar{display:none}
.qf{background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:7px 14px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.qf.on{background:var(--acc);color:#0D1B2A;border-color:var(--acc)}

.list-wrap{flex:1;padding:8px 12px 16px;display:flex;flex-direction:column;gap:10px}

.tcard{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px;cursor:pointer;position:relative;overflow:hidden;transition:transform .12s;-webkit-user-select:none;user-select:none}
.tcard:active{transform:scale(.98)}
.tcard.soleada{border-color:rgba(245,200,66,0.3)}
.tcard.parcial{border-color:rgba(79,168,213,0.25)}
.tcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.tcard.soleada::before{background:linear-gradient(90deg,#F5C842,#E8D070)}
.tcard.parcial::before{background:linear-gradient(90deg,#4FA8D5,#6BBFE8)}
.tcard.sombra::before{background:var(--bg3)}
.tc-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.tc-name{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--text);line-height:1.2;flex:1;margin-right:8px}
.sun-badge{border-radius:20px;padding:4px 9px;font-size:11px;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:4px}
.sun-badge.soleada{background:rgba(245,200,66,0.15);color:#F5D060}
.sun-badge.parcial{background:rgba(79,168,213,0.15);color:var(--acc2)}
.sun-badge.sombra{background:rgba(60,90,120,0.25);color:var(--text3)}
.tc-row2{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.obadge{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:500}
.obadge-dot{width:5px;height:5px;border-radius:50%}
.obadge.op .obadge-dot{background:var(--green)}
.obadge.op{color:var(--green)}
.obadge.cl .obadge-dot{background:var(--red)}
.obadge.cl{color:var(--red)}
.tc-meta{font-size:12px;color:var(--text3)}
.dist-badge{display:inline-flex;align-items:center;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:500;background:rgba(79,168,213,0.12);color:var(--acc2)}
.tc-row3{background:var(--bg3);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text2)}
.sun-bar-wrap{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.sun-bar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.sun-fill{height:100%;background:linear-gradient(90deg,#F5C842,#E8D070);border-radius:3px}
.sb-label{font-size:11px;color:var(--text3)}
.sb-pct{font-size:12px;font-weight:500;color:var(--text2);min-width:28px;text-align:right}
.tc-feel-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.tc-feel-lbl{font-size:11px;color:var(--text3)}
.tc-feel-val{font-size:12px;font-weight:500;color:var(--text2)}
.stars{color:var(--sun);font-size:13px}

.det-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:0}
.det-back{display:none}
.det-back-float{position:absolute;top:12px;left:12px;z-index:30;display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border2);border-radius:50px;padding:7px 14px 7px 10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--acc2);box-shadow:0 2px 12px rgba(0,0,0,0.35)}
.det-back-float:active{opacity:.8}
.det-hero{padding:52px 16px 16px;border-bottom:1px solid var(--border)}
.det-name{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:2px}
.det-sub{font-size:13px;color:var(--text3);margin-bottom:14px}
.verdict-big{border-radius:14px;padding:14px;display:flex;gap:12px;align-items:flex-start}
.verdict-big.buena{background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.2)}
.verdict-big.regular{background:rgba(79,168,213,0.1);border:1px solid var(--border2)}
.verdict-big.mala{background:rgba(60,80,110,0.2);border:1px solid rgba(80,120,160,0.2)}
.vb-icon{font-size:30px;flex-shrink:0}
.vb-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:3px}
.vb-text{font-size:13px;color:var(--text2);line-height:1.55}
.det-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.det-section-map{padding:14px 0 0;border-bottom:1px solid var(--border)}
.det-stitle{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.det-row:last-child{border-bottom:none}
.det-row-lbl{color:var(--text2)}
.det-row-val{font-weight:500;color:var(--text)}
.tip-item{display:flex;gap:10px;padding:7px 0;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border);align-items:flex-start}
.tip-item:last-child{border-bottom:none}
.tip-icon{font-size:16px;flex-shrink:0;width:22px}
.tag{display:inline-block;background:var(--bg3);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text3);margin:4px 4px 0 0;border:1px solid var(--border)}
.loc-map-wrap{width:100%;height:280px;border-radius:0;overflow:hidden;margin-bottom:10px;border:none;background:var(--bg3)}
.loc-map-wrap iframe{width:100%;height:100%;border:none;display:block}
.btn-group{display:flex;flex-direction:row;gap:6px;margin-top:4px}
.btn-group .btn-primary{flex:1;background:var(--acc);color:#0D1B2A;border:none;border-radius:10px;padding:9px 6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-group .btn-primary:active{opacity:.85}
.btn-group .btn-route{background:var(--bg3);color:var(--acc2);border:1px solid var(--border2)}

.map-screen-inner{display:flex;flex-direction:column;height:100%}
#mapContainer{flex:1;position:relative;background:var(--bg2)}
#gmap{width:100%;height:100%}
.map-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text2);padding:24px;text-align:center}
.map-list{flex-shrink:0;background:var(--card);border-top:1px solid var(--border);max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.map-titem{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.map-titem:active{background:var(--bg3)}
.map-titem.highlighted{background:rgba(79,168,213,0.12);border-left:3px solid var(--acc2)}
.map-titem:last-child{border-bottom:none}
.mti-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mti-dot.soleada{background:#F5C842}
.mti-dot.parcial{background:#4FA8D5}
.mti-dot.sombra{background:var(--text3)}
.mti-info{flex:1;min-width:0}
.mti-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mti-meta{font-size:12px;color:var(--text3)}
.mti-go{background:var(--acc);color:#0D1B2A;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}


.search-hdr{padding:10px 12px;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border2);border-radius:50px;padding:10px 14px}
.search-box input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none}
.search-box input::placeholder{color:var(--text3)}
.btn-loc{background:var(--acc);color:#0D1B2A;border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

.empty{text-align:center;padding:48px 24px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.empty-title{font-size:16px;font-weight:500;color:var(--text2)}
.empty-sub{font-size:13px;color:var(--text3)}
.spinner{width:28px;height:28px;border:3px solid var(--bg3);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Estilo InfoWindow de Google Maps */
.gm-style .gm-style-iw-c{background:#0F1E30!important;box-shadow:0 4px 16px rgba(0,0,0,0.5)!important;padding:0!important;border-radius:10px!important;max-width:220px!important}
.gm-style .gm-style-iw-d{overflow:hidden!important;padding:0!important}
.gm-style .gm-style-iw-t::after{background:#0F1E30!important;box-shadow:none!important}
.gm-style button.gm-ui-hover-effect{top:4px!important;right:4px!important;opacity:0.7!important;filter:invert(1)!important}
.gm-style button.gm-ui-hover-effect:hover{opacity:1!important}
.scroll-top{position:absolute;bottom:80px;right:16px;width:44px;height:44px;background:var(--acc);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:30;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.scroll-top.visible{opacity:1;pointer-events:all}
.scroll-top:active{transform:scale(.92)}
.scroll-top svg{width:18px;height:18px;fill:none;stroke:#0D1B2A;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <div class="hdr-logo">
      <svg width="30" height="24" viewBox="0 0 30 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <rect x="1" y="13" width="3" height="9" rx="1" fill="#8B6914"/>
        <rect x="26" y="13" width="3" height="9" rx="1" fill="#8B6914"/>
        <path d="M1 13 L15 4 L29 13 Z" fill="#CC2200"/>
        <clipPath id="awClip"><path d="M1 13 L15 4 L29 13 Z"/></clipPath>
        <g clip-path="url(#awClip)">
          <rect x="-2" y="3" width="3.2" height="12" fill="#FDEBBF" opacity="0.85"/>
          <rect x="4.5" y="3" width="3.2" height="12" fill="#FDEBBF" opacity="0.85"/>
          <rect x="11.4" y="3" width="3.2" height="12" fill="#FDEBBF" opacity="0.85"/>
          <rect x="18.3" y="3" width="3.2" height="12" fill="#FDEBBF" opacity="0.85"/>
          <rect x="25.2" y="3" width="3.2" height="12" fill="#FDEBBF" opacity="0.85"/>
        </g>
        <path d="M1 13 Q3.5 16 6 13 Q8.5 16 11 13 Q13.5 16 15 13 Q16.5 16 19 13 Q21.5 16 24 13 Q26.5 16 29 13" fill="#CC2200" stroke="#AA1800" stroke-width="0.5"/>
        <line x1="1" y1="22" x2="29" y2="22" stroke="#4FA8D5" stroke-width="0.8" stroke-dasharray="2 2"/>
        <rect x="10" y="18" width="10" height="1.5" rx="0.75" fill="#4FA8D5" opacity="0.6"/>
        <line x1="12" y1="19.5" x2="12" y2="22" stroke="#4FA8D5" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
        <line x1="18" y1="19.5" x2="18" y2="22" stroke="#4FA8D5" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
      </svg>
      Terrazas
    </div>
    <button class="w-pill" onclick="toggleSheet()">
      <span class="wi" id="pIcon">&#9728;</span>
      <span class="wt" id="pTemp">--</span>
      <span class="wd" id="pDesc">Valencia</span>
    </button>
  </div>

  <div class="screens">
    <div class="screen active" id="s-home">
      <div class="hero-banner sol" id="heroBanner">
        <div class="hb-title" id="heroTitle">Buscando terrazas...</div>
        <div class="hb-sub" id="heroSub">Consultando el tiempo</div>
        <div class="hb-temp" id="heroTemp">--<span>°</span></div>
      </div>
      <div class="quick-filters">
        <button class="qf on" onclick="setF('todas',this)">Todas</button>
        <button class="qf" onclick="setF('sol',this)">Con sol</button>
        <button class="qf" onclick="setF('abierto',this)">Abierto</button>
        <button class="qf" onclick="setF('cafe',this)">Café</button>
        <button class="qf" onclick="setF('restaurante',this)">Comer</button>
        <button class="qf" onclick="setF('bar',this)">Bar</button>
      </div>
      <div class="list-wrap" id="homeList">
        <div class="empty"><div class="spinner"></div><div style="font-size:14px;color:var(--text2)">Buscando terrazas en Valencia...</div></div>
      </div>
    </div>

    <div class="screen" id="s-search">
      <div class="search-hdr">
        <div class="search-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7BB8D4" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="sInput" placeholder="Barrio, tipo, nombre..." oninput="doSearch()"/>
          <button class="btn-loc" onclick="getLocation()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0D1B2A" stroke-width="2.2" stroke-linecap="round"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          </button>
        </div>
      </div>
      <div class="quick-filters">
        <button class="qf on" onclick="setSF('todas',this)">Todas</button>
        <button class="qf" onclick="setSF('sol',this)">Con sol</button>
        <button class="qf" onclick="setSF('cafe',this)">Café</button>
        <button class="qf" onclick="setSF('restaurante',this)">Comer</button>
        <button class="qf" onclick="setSF('bar',this)">Bar</button>
        <button class="qf" onclick="setSF('abierto',this)">Abierto</button>
      </div>
      <div style="padding:4px 16px 8px;font-size:12px;color:var(--text3)" id="searchCount">0 terrazas</div>
      <div class="list-wrap" id="searchList" style="padding-top:0"></div>
    </div>

    <div class="screen" id="s-detail">
      <button class="det-back-float" onclick="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Volver
      </button>
      <div class="det-scroll" id="detContent"></div>
    </div>

    <div class="screen" id="s-map">
      <div class="map-screen-inner">
        <div id="mapContainer">
          <div class="map-empty" id="mapEmpty">

<script>
var W = null, filt = 'todas', sfilt = 'todas', prevScreen = 'home';
var lat = 39.4699, lon = -0.3763;
var GKEY = 'AIzaSyBxP_YbIqaFFTYVR1U_a0Z6zBKJPgJhFE0';
var DB = [];
var gmap = null, gmarkers = [], infoWindow = null;

/* ── WEATHER ──────────────────────────────────────────── */
function wi(c) {
  if (c === 0)  return { ic: '&#9728;',  ds: 'Cielo despejado',     tp: 'sol'    };
  if (c <= 2)   return { ic: '&#9925;',  ds: 'Parcialmente nublado', tp: 'parcial'};
  if (c === 3)  return { ic: '&#9729;',  ds: 'Nublado',              tp: 'nubes'  };
  if (c <= 49)  return { ic: '&#127787;',ds: 'Bruma',                tp: 'nubes'  };
  if (c <= 79)  return { ic: '&#127783;',ds: 'Lluvia',               tp: 'lluvia' };
  if (c <= 99)  return { ic: '&#9928;',  ds: 'Tormenta',             tp: 'lluvia' };
  return { ic: '&#127780;', ds: 'Variable', tp: 'parcial' };
}

async function loadW() {
  try {
    var r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,precipitation,cloud_cover,uv_index&timezone=Europe/Madrid');
    var d = await r.json();
    W = d.current;
  } catch(e) {
    W = { temperature_2m:21, apparent_temperature:19, weather_code:1, wind_speed_10m:10, relative_humidity_2m:55, precipitation:0, cloud_cover:20, uv_index:5 };
  }
  applyW();
  if (DB.length > 0) { renderHome(); renderSearch(); renderMapList(); }
}

function applyW() {

  document.getElementById('pIcon').innerHTML = i.ic;
  document.getElementById('pTemp').textContent = t + '°';
  document.getElementById('pDesc').textContent = i.ds.split(' ').slice(0,2).join(' ');
  document.getElementById('wIcon').innerHTML = i.ic;
  document.getElementById('wDesc').textContent = i.ds;
  document.getElementById('wWind').textContent = Math.round(W.wind_speed_10m) + ' km/h';
  document.getElementById('wHum').textContent = Math.round(W.relative_humidity_2m) + '%';
  document.getElementById('wWRain').textContent = (W.precipitation || 0).toFixed(1) + ' mm';
  document.getElementById('wCloud').textContent = Math.round(W.cloud_cover || 0) + '%';
  document.getElementById('wUv').textContent = (W.uv_index || 0).toFixed(1);
  var good = i.tp === 'sol' || (i.tp === 'parcial' && W.wind_speed_10m < 25 && t > 14);
  var v = document.getElementById('wVerdict');
  v.className = 'verdict-strip ' + (good ? 'buena' : i.tp === 'lluvia' ? 'mala' : 'regular');
  v.textContent = good ? 'Buen día para terraza' : i.tp === 'lluvia' ? 'Hay precipitaciones hoy' : 'Condiciones aceptables';
  var hb = document.getElementById('heroBanner');
  hb.className = 'hero-banner ' + i.tp;
  document.getElementById('heroTitle').textContent = good ? 'Buen día para terraza' : 'Condiciones de hoy';
  document.getElementById('heroSub').textContent = i.ds + ' · Valencia';
  document.getElementById('heroTemp').innerHTML = t + '<span>°</span>';
}

/* ── SOLAR ────────────────────────────────────────────── */
function solarPosition() {
  var now = new Date();
  var JD = now.getTime() / 86400000 + 2440587.5;
  var n = JD - 2451545.0;
  var L = (280.460 + 0.9856474 * n) % 360; if (L < 0) L += 360;
  var g = (357.528 + 0.9856003 * n) % 360; if (g < 0) g += 360;
  var g_r = g * Math.PI / 180;
  var lam_r = (L + 1.915 * Math.sin(g_r) + 0.020 * Math.sin(2 * g_r)) * Math.PI / 180;
  var eps = (23.439 - 0.0000004 * n) * Math.PI / 180;
  var dec = Math.asin(Math.sin(eps) * Math.sin(lam_r));
  var RA = Math.atan2(Math.cos(eps) * Math.sin(lam_r), Math.cos(lam_r));
  var EqT = 4 * ((L * Math.PI / 180) - RA) * 180 / Math.PI;
  var utcMin = now.getUTCHours() * 60 + now.getUTCMinutes() + now.getUTCSeconds() / 60;
  var hourAngle = ((utcMin + EqT + lon * 4) / 4 - 180) * Math.PI / 180;
  var lat_r = lat * Math.PI / 180;
  var sinElev = Math.sin(lat_r)*Math.sin(dec) + Math.cos(lat_r)*Math.cos(dec)*Math.cos(hourAngle);
  var elev = Math.asin(Math.max(-1, Math.min(1, sinElev))) * 180 / Math.PI;
  if (elev <= 0) return null;
  var cosElev = Math.cos(elev * Math.PI / 180);
  if (cosElev < 0.0001) return { az: 180, elev: elev };
  var sinAz = Math.max(-1, Math.min(1, -Math.cos(dec) * Math.sin(hourAngle) / cosElev));
  var az = Math.asin(sinAz) * 180 / Math.PI;
  if (Math.cos(hourAngle) < Math.tan(dec) / Math.tan(lat_r)) az = 180 - az;
  return { az: (az + 360) % 360, elev: elev };
}

function sunExp(o, cloud, tipo) {
  if (tipo === 'lluvia') return { n: 0, txt: 'Lluvia', cls: 'sombra' };
  var sol = solarPosition();
  if (!sol) return { n: 0, txt: 'Sin sol', cls: 'sombra' };
  var om = { N:0,NE:45,E:90,SE:135,S:180,SO:225,O:270,NO:315 };
  var ta = om[o] !== undefined ? om[o] : 180;
  var diff = Math.abs(sol.az - ta); if (diff > 180) diff = 360 - diff;
  var n = Math.round(Math.max(0, Math.cos(diff * Math.PI / 180)) * Math.min(1, sol.elev / 20) * (1 - (cloud || 0) / 100 * 0.85) * 100);
  if (n >= 55) return { n: n, txt: 'Sol directo', cls: 'soleada' };
  if (n >= 20) return { n: n, txt: 'Sol parcial', cls: 'parcial' };
  return { n: n, txt: 'A la sombra', cls: 'sombra' };
}

function feelAdj(sunPct) {
  if (!W) return null;
  return Math.round((W.apparent_temperature + (sunPct / 100) * 4) * 10) / 10;
}

/* ── UTILS ────────────────────────────────────────────── */
function distKm(t) {
  var R = 6371, dLat = (t.lat - lat) * Math.PI/180, dLon = (t.lng - lon) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat*Math.PI/180)*Math.cos(t.lat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function fmtDist(km) { return km < 1 ? Math.round(km*1000)+'m' : km.toFixed(1)+'km'; }
function sortByDist(l) { return l.slice().sort(function(a,b){ return distKm(a)-distKm(b); }); }
function isOp(t) { var h = new Date().getHours(); return t.h.c > t.h.a ? h >= t.h.a && h < t.h.c : h >= t.h.a || h < t.h.c; }
function stars(r) { var s=''; for(var i=0;i<Math.floor(r);i++) s+='&#9733;'; if(r%1>=.5) s+='½'; for(var i=0;i<5-Math.floor(r)-(r%1>=.5?1:0);i++) s+='&#9734;'; return s; }
function cl() { return W ? W.cloud_cover||0 : 0; }
function tp() { return wi(W ? W.weather_code||0 : 0).tp; }

/* ── CARD HTML ────────────────────────────────────────── */
function cardHTML(t) {
  var sun = sunExp(t.o, cl(), tp()), op = isOp(t), st = stars(t.r);
  var cond = []; if(t.toldos) cond.push('Toldos'); if(t.calef) cond.push('Calefactores'); if(t.vistas) cond.push('Vistas');
  var si = sun.cls==='soleada' ? '&#9728;' : sun.cls==='parcial' ? '&#9925;' : '&#127745;';
  return '<div class="tcard '+sun.cls+'" onclick="showDetail('+t.id+')">'
    +'<div class="tc-row1"><div class="tc-name">'+t.n+'</div><div class="sun-badge '+sun.cls+'">'+si+' '+sun.txt+'</div></div>'
    +'<div class="tc-row2">'
    +'<span class="obadge '+(op?'op':'cl')+'"><span class="obadge-dot"></span>'+(op?'Abierto':'Cerrado')+'</span>'
    +'<span class="dist-badge">'+fmtDist(distKm(t))+'</span>'
    +'<span class="tc-meta"><span class="stars">'+st+'</span> '+t.r+' · '+t.z+'</span>'
    +'</div>'
    +'<div class="tc-row3">'+(cond.length?cond.join(' · '):'Terraza al aire libre')+'</div>'
    +'<div class="sun-bar-wrap"><span class="sb-label">Sol ahora:</span><div class="sun-bar"><div class="sun-fill" style="width:'+sun.n+'%"></div></div><span class="sb-pct">'+sun.n+'%</span></div>'
    +'<div class="tc-feel-row"><span class="tc-feel-lbl">Sensación térmica</span><span class="tc-feel-val">'+(feelAdj(sun.n)!==null?feelAdj(sun.n)+'°C':'--')+'</span></div>'
    +'</div>';
}

/* ── FILTER / RENDER ──────────────────────────────────── */
function filtered(f, q) {
  return DB.filter(function(t) {
    var mq = !q || t.n.toLowerCase().indexOf(q)>=0 || t.z.toLowerCase().indexOf(q)>=0;
    var sun = sunExp(t.o,cl(),tp()), op = isOp(t);
    if (f==='sol')         return mq && sun.cls==='soleada';
    if (f==='cafe')        return mq && t.t==='cafe';
    if (f==='restaurante') return mq && t.t==='restaurante';
    if (f==='bar')         return mq && t.t==='bar';
    if (f==='abierto')     return mq && op;
    return mq;
  });
}
function renderHome() {
  if (DB.length === 0) return; // esperar a que carguen los datos
  var l = sortByDist(filtered(filt,'')), el = document.getElementById('homeList');
  el.innerHTML = l.length ? l.map(cardHTML).join('') : '<div class="empty"><div class="empty-title">Sin resultados</div></div>';
}
function renderSearch() {
  if (DB.length === 0) return;
  var q = document.getElementById('sInput').value.toLowerCase(), l = sortByDist(filtered(sfilt,q));
  document.getElementById('searchCount').textContent = l.length + ' terraza' + (l.length!==1?'s':'');
  var el = document.getElementById('searchList');
  el.innerHTML = l.length ? l.map(cardHTML).join('') : '<div class="empty"><div class="empty-title">Sin resultados</div></div>';
}
function setF(f,btn){ filt=f; document.querySelectorAll('#s-home .qf').forEach(function(b){b.classList.remove('on');}); btn.classList.add('on'); renderHome(); }
function setSF(f,btn){ sfilt=f; document.querySelectorAll('#s-search .qf').forEach(function(b){b.classList.remove('on');}); btn.classList.add('on'); renderSearch(); }
function doSearch(){ renderSearch(); }

/* ── DETAIL ───────────────────────────────────────────── */
function showDetail(id) {
  var t = DB.find(function(x){ return x.id===id; }); if(!t) return;
  var sun = sunExp(t.o,cl(),tp()), op = isOp(t), st = stars(t.r);
  var windOk = (W?W.wind_speed_10m||0:0)<25, tempOk = (W?W.temperature_2m||20:20)>14, rainOk = tp()!=='lluvia';
  var score = (sun.n>40?1:0)+(windOk?1:0)+(tempOk?1:0)+(rainOk?1:0);
  var vc,vi,vt,vd;
  if(score>=3){ vc='buena';vi='&#9728;';vt='Perfecta para hoy';vd='Condiciones ideales. '+(sun.n>60?'Hay sol directo ahora mismo.':'Buena luz y temperatura agradable.'); }
  else if(score>=2){ vc='regular';vi='&#9925;';vt='Condiciones aceptables';vd='Puedes ir, pero '+(!windOk?'hay algo de viento.':!tempOk?'la temperatura es fresca.':'puede haber nubes.'); }
  else { vc='mala';vi='&#127783;';vt='No es el mejor día';vd=rainOk?'Hoy no es ideal para terraza.':'Hay precipitaciones, mejor esperar.'; }
  var tips=[];
  if(!op) tips.push({i:'&#9200;',t:'Abre a las '+t.h.a+':00h'});
  if(sun.n>50) tips.push({i:'&#128083;',t:'Lleva gafas de sol'});
  if((W?W.uv_index||0:0)>5) tips.push({i:'&#9728;',t:'UV alto, usa protector solar'});
  if(!windOk) tips.push({i:'&#127788;',t:'Algo de viento, lleva chaqueta'});
  var temp=W?Math.round(W.temperature_2m):'--', wind=W?Math.round(W.wind_speed_10m):'--';
  prevScreen = document.querySelector('.screen.active').id.replace('s-','');

  // Limpiar watchers anteriores del mapa de detalle
  if(window._detWatchId) { navigator.geolocation.clearWatch(window._detWatchId); window._detWatchId=null; }
  if(window._detOriHandler) { window.removeEventListener('deviceorientation',window._detOriHandler); window._detOriHandler=null; }
  window._detUserMarker = null;
  window._detUserHeading = window._detUserHeading || 0;
  var locMap = '';
  if(gmap){
    locMap = '<div id="locMapDiv" style="width:100%;height:100%"></div>';
  } else {
    var delta=0.004, bbox=(t.lng-delta)+','+(t.lat-delta)+','+(t.lng+delta)+','+(t.lat+delta);
    locMap = '<iframe src="https://www.openstreetmap.org/export/embed.html?bbox='+bbox+'&layer=mapnik&marker='+t.lat+','+t.lng+'" allowfullscreen style="width:100%;height:100%;border:none"></iframe>';
  }

  document.getElementById('detContent').innerHTML =
    ''
    +'<div class="det-hero"><div class="det-name">'+t.n+'</div>'
    +'<div class="det-sub">'+t.t.charAt(0).toUpperCase()+t.t.slice(1)+' · '+t.z+' · '+t.dir+'</div>'
    +'<div class="verdict-big '+vc+'"><div class="vb-icon">'+vi+'</div><div><div class="vb-title">'+vt+'</div><div class="vb-text">'+vd+'</div></div></div></div>'
    +'<div class="det-section det-section-map"><div class="det-stitle" style="padding:0 16px 10px;margin:0">Ubicación</div>'
    +'<div class="loc-map-wrap" id="locMapWrap">'+locMap+'</div>'
    +'<div style="padding:10px 0 0"><div class="btn-group">'
    +'<button class="btn-primary" onclick="openGMaps('+t.lat+','+t.lng+')">Google Maps</button>'
    +'<button class="btn-primary" onclick="openSV('+t.lat+','+t.lng+')">Street View</button>'
    +'<button class="btn-primary btn-route" onclick="openRoute('+t.lat+','+t.lng+')">Cómo llegar</button>'
    +'</div></div>'
    +'<div class="det-section"><div class="det-stitle">Condiciones ahora</div>'
    +'<div class="det-row"><span class="det-row-lbl">Sol en terraza</span><span class="det-row-val">'+sun.txt+' ('+sun.n+'%)</span></div>'
    +'<div class="det-row"><span class="det-row-lbl">Temperatura</span><span class="det-row-val">'+temp+'°C · Sensación '+(feelAdj(sun.n)!==null?feelAdj(sun.n):'--')+'°C</span></div>'
    +'<div class="det-row"><span class="det-row-lbl">Viento</span><span class="det-row-val">'+wind+' km/h '+(windOk?'&#9989;':'&#9888;')+'</span></div>'
    +'<div class="det-row"><span class="det-row-lbl">Estado</span><span class="det-row-val"><span class="obadge '+(op?'op':'cl')+'"><span class="obadge-dot"></span>'+(op?'Abierto':'Cerrado · Abre '+t.h.a+'h')+'</span></span></div>'
    +'</div>'
    +'<div class="det-section"><div class="det-stitle">Valoración</div>'
    +'<div class="det-row"><span class="det-row-lbl">Nota</span><span class="det-row-val"><span class="stars">'+st+'</span> '+t.r+'</span></div>'
    +'<div class="det-row"><span class="det-row-lbl">Reseñas</span><span class="det-row-val">'+t.rv.toLocaleString()+'</span></div>'
    +'</div>'
    +(tips.length?'<div class="det-section"><div class="det-stitle">Consejos</div>'+tips.map(function(tp2){return'<div class="tip-item"><span class="tip-icon">'+tp2.i+'</span><span>'+tp2.t+'</span></div>';}).join('')+'</div>':'')
    +'<div class="det-section"><div class="det-stitle">Sobre el local</div>'
    +'<p style="font-size:14px;color:var(--text2);line-height:1.6">'+t.d+'</p></div>';

  goTo('detail');
  var detScroll=document.getElementById('detContent'); if(detScroll&&detScroll.parentElement) detScroll.parentElement.scrollTop=0;

  if(gmap) {
    setTimeout(function(){
      var wrap = document.getElementById('locMapDiv'); if(!wrap) return;
      var detMap = new google.maps.Map(wrap, {center:{lat:t.lat,lng:t.lng}, zoom:15, disableDefaultUI:true});
      var detInfoWindow = new google.maps.InfoWindow();

      // Resto de terrazas con círculos (igual que pantalla Mapa)
      try { DB.forEach(function(other) {
        if (other.id === t.id) return;
        var s2 = sunExp(other.o,cl(),tp());
        var col = s2.cls==='soleada'?'#F5C842':s2.cls==='parcial'?'#4FA8D5':'#4A7A9B';
        var m2 = new google.maps.Marker({
          position:{lat:other.lat,lng:other.lng}, map:detMap, title:other.n,
          icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:col,fillOpacity:0.85,strokeColor:'#0D1B2A',strokeWeight:1.5}
        });
        (function(marker, place){
          marker.addListener('click', function(){
            var s3  = sunExp(place.o, cl(), tp());
            var op3 = isOp(place);
            var sunColor = s3.cls==='soleada'?'#F5C842':s3.cls==='parcial'?'#4FA8D5':'#9BB8CC';
            var opColor  = op3 ? '#4DC98A' : '#E06875';
            detInfoWindow.setContent(buildPopupContent(place, sunColor, opColor, op3, s3));
            detInfoWindow.open(detMap, marker);
          });
        })(m2, other);
      });

      // Marcador rojo estándar de Google para la terraza seleccionada
      new google.maps.Marker({
        position:{lat:t.lat,lng:t.lng}, map:detMap, title:t.n,
        icon:'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
        zIndex:999
      });

      // Pin ubicación usuario
      if(navigator.geolocation){
        window._detWatchId = navigator.geolocation.watchPosition(function(p){
          var uPos={lat:p.coords.latitude,lng:p.coords.longitude};
          if(!window._detUserMarker){
            window._detUserMarker=new google.maps.Marker({position:uPos,map:detMap,title:'Tu ubicación',icon:buildUserIcon(window._detUserHeading||0),zIndex:500});
          } else {
            window._detUserMarker.setPosition(uPos);
            window._detUserMarker.setIcon(buildUserIcon(window._detUserHeading||0));
          }
        },{enableHighAccuracy:true});
        window._detOriHandler = function(e){
          var h=e.webkitCompassHeading||(e.alpha?360-e.alpha:0);
          window._detUserHeading=h;
          if(window._detUserMarker) window._detUserMarker.setIcon(buildUserIcon(h));
        };
        if(window.DeviceOrientationEvent){
          if(typeof DeviceOrientationEvent.requestPermission==='function'){
            DeviceOrientationEvent.requestPermission().then(function(r){if(r==='granted')window.addEventListener('deviceorientation',window._detOriHandler);}).catch(function(){});
          } else { window.addEventListener('deviceorientation',window._detOriHandler); }
        }
      }
    }, 200);
  }

function buildUserIcon(heading) {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">'
    // Cono de orientación difuminado
    + '<defs>'
    +   '<radialGradient id="hg" cx="50%" cy="100%" r="80%">'
    +     '<stop offset="0%" stop-color="#62C8FF" stop-opacity="0.5"/>'
    +     '<stop offset="100%" stop-color="#62C8FF" stop-opacity="0"/>'
    +   '</radialGradient>'
    +   '<radialGradient id="bg" cx="50%" cy="50%" r="50%">'
    +     '<stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>'
    +     '<stop offset="40%" stop-color="#62C8FF" stop-opacity="0.9"/>'
    +     '<stop offset="100%" stop-color="#1A8FD1" stop-opacity="0.3"/>'
    +   '</radialGradient>'
    + '</defs>'
    // Cono de dirección
    + '<path d="M24 24 L18 4 L24 8 L30 4 Z" fill="url(#hg)" transform="rotate(' + heading + ' 24 24)"/>'
    // Halo difuminado exterior
    + '<circle cx="24" cy="24" r="16" fill="#62C8FF" fill-opacity="0.18"/>'
    // Punto azul claro con degradado
    + '<circle cx="24" cy="24" r="10" fill="url(#bg)" stroke="#1A8FD1" stroke-width="2"/>'
    + '<circle cx="24" cy="24" r="4" fill="#fff" fill-opacity="0.9"/>'
    + '</svg>';
  return {
    url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
    scaledSize: new google.maps.Size(48, 48),
    anchor: new google.maps.Point(24, 24)
  };
}

window.mapsCallback = function() {
  var mapEl = document.getElementById('gmap');
  mapEl.style.display = 'block';
  document.getElementById('mapEmpty').style.display = 'none';
  gmap = new google.maps.Map(mapEl, {center:{lat:39.4699,lng:-0.3763}, zoom:13, disableDefaultUI:true});
  infoWindow = new google.maps.InfoWindow();
  if(navigator.geolocation){
    navigator.geolocation.watchPosition(function(p){
      var userPos = {lat:p.coords.latitude, lng:p.coords.longitude};
      if(!window._mainUserMarker){
        window._mainUserMarker = new google.maps.Marker({
          position: userPos,
          map: gmap,
          title: 'Tu ubicación',
          icon: buildUserIcon(window._mainUserHeading||0),
          zIndex: 500
        });
      } else {
        window._mainUserMarker.setPosition(userPos);
        window._mainUserMarker.setIcon(buildUserIcon(window._mainUserHeading||0));
      }
    }, null, {enableHighAccuracy:true});

    function handleMainOrientation(e){
      var heading = e.webkitCompassHeading || (e.alpha ? 360 - e.alpha : 0);
      window._mainUserHeading = heading;
      if(window._mainUserMarker){
        window._mainUserMarker.setIcon(buildUserIcon(heading));
      }
    }
    if(window.DeviceOrientationEvent){
      if(typeof DeviceOrientationEvent.requestPermission==='function'){
        DeviceOrientationEvent.requestPermission().then(function(r){
          if(r==='granted') window.addEventListener('deviceorientation', handleMainOrientation);
        }).catch(function(){});
      } else {
        window.addEventListener('deviceorientation', handleMainOrientation);
      }
    }
  }
  loadPlaces();
};

function loadPlaces() {
  if (!gmap) { return; }
  var center = new google.maps.LatLng(39.4699, -0.3763);
  var svc = new google.maps.places.PlacesService(gmap);
  var seen = {}, results = [], pending = 3;

  // Pre-seed con datos estáticos por si acaso Places devuelve poco
  STATIC_DB.forEach(function(t){ seen['static_'+t.id] = true; });

  function onDone() {
    pending--;
    setStatus('Procesando ' + results.length + ' terrazas...');
    if (pending > 0) return;
    // Mezclar resultados de Places con estáticos no duplicados
    var allResults = results.slice();
    STATIC_DB.forEach(function(t){
      var dup = allResults.some(function(r){
        return Math.abs(r.lat-t.lat)<0.0005 && Math.abs(r.lng-t.lng)<0.0005;
      });
      if (!dup) allResults.push({id:allResults.length, n:t.n, t:t.t, z:t.z, d:t.d, dir:t.dir, h:t.h, o:t.o, tags:t.tags, r:t.r, rv:t.rv, toldos:t.toldos, calef:t.calef, vistas:t.vistas, lat:t.lat, lng:t.lng});
    });
    DB = sortByDist(allResults);
    renderHome(); renderSearch(); renderMapList(); buildMarkers();
  }

  function doSearch(keyword, type) {
    svc.nearbySearch(
      {location:center, radius:8000, keyword:keyword, type:type},
      function(places, status) {
        if (places) {
          places.forEach(function(p) {
            if (!p.geometry || !p.place_id || seen[p.place_id]) return;
            seen[p.place_id] = true;
            var dlat = p.geometry.location.lat()-39.4699, dlng = p.geometry.location.lng()-(-0.3763);
            var b = Math.atan2(dlng,dlat)*180/Math.PI;
            var dirs=['N','NE','E','SE','S','SO','O','NO'];
            results.push({
              id: results.length,
              n: p.name,
              t: (p.types&&p.types.indexOf('cafe')>=0)?'cafe':(p.types&&p.types.indexOf('bar')>=0)?'bar':'restaurante',
              z: p.vicinity?p.vicinity.split(',').slice(-1)[0].trim():'Valencia',
              d: p.name+(p.vicinity?' — '+p.vicinity:''),
              dir: p.vicinity||'Valencia',
              h: {a:10,c:24}, o: dirs[Math.round(((b%360)+360)%360/45)%8]||'S',
              tags:[], r:p.rating||4.0, rv:p.user_ratings_total||0,
              toldos:false, calef:false, vistas:false,
              lat:p.geometry.location.lat(), lng:p.geometry.location.lng()
            });
          });
        }
        onDone();
      }
    );
  }

  doSearch('terraza restaurante','restaurant');
  doSearch('terraza bar','bar');
  doSearch('terraza cafe','cafe');
}

function buildMarkers() {
  gmarkers.forEach(function(m){ m.marker.setMap(null); });
  gmarkers = [];
  DB.forEach(function(t) {
    var sun = sunExp(t.o,cl(),tp());
    var color = sun.cls==='soleada'?'#F5C842':sun.cls==='parcial'?'#4FA8D5':'#4A7A9B';
    var marker = new google.maps.Marker({
      position:{lat:t.lat,lng:t.lng}, map:gmap, title:t.n,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:color,fillOpacity:1,strokeColor:'#0D1B2A',strokeWeight:2}
    });
    (function(mk, place){
      mk.addListener('click', function(){
        var op=isOp(place), s2=sunExp(place.o,cl(),tp());
        var sunColor = s2.cls==='soleada'?'#F5C842':s2.cls==='parcial'?'#4FA8D5':'#9BB8CC';
        var opColor  = op?'#4DC98A':'#E06875';
        infoWindow.setContent(
          '<div style="font-family:DM Sans,sans-serif;padding:8px 8px 6px;min-width:190px;background:#0F1E30;color:#F4FAFF;border-radius:8px">'
          +'<div style="font-weight:600;font-size:13px;margin-bottom:2px;color:#F4FAFF">'+place.n+'</div>'
          +'<div style="font-size:11px;color:#C8E4F4;margin-bottom:6px">'+place.dir+'</div>'
          +'<div style="display:flex;gap:8px;margin-bottom:8px;font-size:11px;font-weight:500;flex-wrap:wrap">'
            +'<span style="color:'+sunColor+'">&#9728; '+s2.n+'%</span>'
            +'<span style="color:'+opColor+'">'+(op?'&#9679; Abierto':'&#9679; Cerrado')+'</span>'
            +'<span style="color:#7BB8D4">&#128205; '+fmtDist(distKm(place))+'</span>'
          +'</div>'
          +'<button onclick="showDetail('+place.id+')" style="background:#4FA8D5;color:#0D1B2A;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-family:DM Sans,sans-serif;cursor:pointer;font-weight:600">Ver detalle</button>'
          +'</div>'
        );
        infoWindow.open(gmap, mk);
        highlightMapListItem(place.id);
      });
    })(marker, t);
    gmarkers.push({marker:marker, id:t.id});
  });
}

function highlightMapListItem(id) {
  // Remove previous highlight
  document.querySelectorAll('.map-titem.highlighted').forEach(function(el){
    el.classList.remove('highlighted');
  });
  // Find and highlight the item
  var list = document.getElementById('mapList');
  if (!list) return;
  var items = list.querySelectorAll('.map-titem');
  items.forEach(function(item, idx) {
    if (DB[idx] && DB[idx].id === id) {
      item.classList.add('highlighted');
      // Scroll the list to show the item
      item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });
}

function renderMapList() {
  var el = document.getElementById('mapList');
  el.innerHTML = DB.map(function(t){
    var sun=sunExp(t.o,cl(),tp()), op=isOp(t);
    var sunColor = sun.cls==='soleada'?'#F5D060':sun.cls==='parcial'?'var(--acc2)':'var(--text3)';
    var opColor  = op ? 'var(--green)' : 'var(--red)';
    return '<div class="map-titem" onclick="focusMarker('+t.id+')">'
      +'<div class="mti-dot '+sun.cls+'"></div>'
      +'<div class="mti-info">'
        +'<div class="mti-name">'+t.n+'</div>'
        +'<div class="mti-meta">'
          +'<span style="color:'+opColor+';font-weight:500">'+(op?'Abierto':'Cerrado')+'</span>'
          +' · '
          +'<span style="color:'+sunColor+';font-weight:500">'+sun.txt+'</span>'
          +' · '
          +'<span style="color:var(--text3)">'+fmtDist(distKm(t))+'</span>'
        +'</div>'
      +'</div>'
      +'<button class="mti-go" onclick="event.stopPropagation();showDetail('+t.id+')">Ver</button>'
      +'</div>';
  }).join('');
}

function focusMarker(id){
  if(!gmap) return;
  var t=DB.find(function(x){return x.id===id;});
  if(t) gmap.panTo({lat:t.lat,lng:t.lng});
  var m=gmarkers.find(function(x){return x.id===id;});
  if(m) google.maps.event.trigger(m.marker,'click');
}

function scrollTopFn(screenId) {
  var el = document.getElementById(screenId);
  if (el) el.scrollTo({ top: 0, behavior: 'smooth' });
}

function onScreenScroll(e) {
  var screen = e.target;
  var id = screen.id;
  if (id !== 's-home' && id !== 's-search') return;
  var btnHome   = document.getElementById('scrollTopHome');
  var btnSearch = document.getElementById('scrollTopSearch');
  var scrolled  = screen.scrollTop > 200;
  if (id === 's-home') {
    btnHome.classList.toggle('visible', scrolled);
  } else {
    btnSearch.classList.toggle('visible', scrolled);
  }
}

function goTo(s){
  // Manage scroll-to-top button visibility per screen
  var btnHome   = document.getElementById('scrollTopHome');
  var btnSearch = document.getElementById('scrollTopSearch');
  if (btnHome)   { btnHome.style.display   = s==='home'   ? 'flex' : 'none'; btnHome.classList.remove('visible'); }
  if (btnSearch) { btnSearch.style.display = s==='search' ? 'flex' : 'none'; btnSearch.classList.remove('visible'); }
  document.querySelectorAll('.screen').forEach(function(el){el.classList.remove('active');});
  document.getElementById('s-'+s).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  var nb=document.getElementById('nb-'+s); if(nb) nb.classList.add('active');
  if(s==='search') setTimeout(function(){ var el=document.getElementById('sInput'); el.readOnly=true; el.focus(); el.readOnly=false; }, 200);

}
function goBack(){ goTo(prevScreen); }
function toggleSheet(){ document.getElementById('wSheet').classList.toggle('open'); }

  if(navigator.geolocation) navigator.geolocation.getCurrentPosition(function(p){
    lat=p.coords.latitude; lon=p.coords.longitude; loadW(); renderHome(); renderSearch(); renderMapList();
  });
}
