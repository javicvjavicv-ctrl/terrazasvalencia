<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Terrazas">
<meta name="theme-color" content="#1E1A14">
<title>Terrazas Valencia</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sun:#F5A623;--terra:#D4845A;--sky:#5B9BD6;
  --bg:#1E1A14;--bg2:#2A2318;--bg3:#332B1F;--card:#2E2720;--card2:#3A3028;
  --text:#F0EAE0;--text2:#B8A898;--text3:#7A6E62;
  --border:rgba(255,200,130,0.1);--border2:rgba(255,200,130,0.18);
  --green:#5DBE7A;--red:#E06060;
  --nav-h:64px;--header-h:60px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#111}
body{font-family:'DM Sans',sans-serif;color:var(--text)}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg);position:relative}

.hdr{background:var(--card);height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.hdr-logo{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--terra);display:flex;align-items:center;gap:8px}
.logo-sun{width:24px;height:24px;background:var(--sun);border-radius:50%;flex-shrink:0}
.w-pill{display:flex;align-items:center;gap:6px;background:var(--bg3);border-radius:20px;padding:5px 12px;border:1px solid var(--border);cursor:pointer;font-family:'DM Sans',sans-serif}
.w-pill .wi{font-size:18px}
.w-pill .wt{font-size:15px;font-weight:600;color:var(--text)}
.w-pill .wd{font-size:11px;color:var(--text3)}

.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
.screen.active{display:flex}

.nav{background:var(--card);height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);display:flex;align-items:center;border-top:1px solid var(--border);flex-shrink:0;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;cursor:pointer;padding:0;height:100%}
.nav-lbl{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.02em}
.nav-btn.active .nav-lbl{color:var(--terra)}
.nav-ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.nav-ico svg{width:22px;height:22px;fill:none;stroke:var(--text3);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.nav-btn.active .nav-ico svg{stroke:var(--terra)}

.w-sheet-wrap{position:absolute;inset:0;z-index:50;pointer-events:none;display:flex;flex-direction:column}
.w-sheet-bg{flex:1;transition:background .25s}
.w-sheet{background:var(--card2);border-radius:24px 24px 0 0;padding:12px 16px 32px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.32,1);pointer-events:all;border-top:1px solid var(--border2)}
.w-sheet-wrap.open{pointer-events:all}
.w-sheet-wrap.open .w-sheet-bg{background:rgba(0,0,0,0.6)}
.w-sheet-wrap.open .w-sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 18px}
.w-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.w-cell{background:var(--bg3);border-radius:12px;padding:10px 12px;border:1px solid var(--border)}
.w-cell-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.w-cell-val{font-size:16px;font-weight:500;color:var(--text)}
.w-hero{display:flex;justify-content:space-between;align-items:center;padding:4px 0 14px}
.w-hero-icon{font-size:54px;line-height:1;margin-bottom:4px}
.w-hero-desc{font-size:14px;color:var(--text2)}
.w-hero-temp{font-family:'Fraunces',serif;font-size:64px;font-weight:300;color:var(--text);line-height:1}
.w-hero-temp span{font-size:26px;color:var(--text3)}
.verdict-strip{border-radius:12px;padding:10px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;margin-top:4px}
.verdict-strip.buena{background:rgba(245,166,35,0.15);color:#F5C060;border:1px solid rgba(245,166,35,0.2)}
.verdict-strip.regular{background:rgba(91,155,214,0.12);color:#80B8E0;border:1px solid rgba(91,155,214,0.2)}
.verdict-strip.mala{background:rgba(100,100,120,0.15);color:var(--text2);border:1px solid rgba(150,150,170,0.15)}

.hero-banner{margin:12px 12px 0;border-radius:16px;padding:18px 16px;position:relative;overflow:hidden;flex-shrink:0;border:1px solid var(--border2)}
.hero-banner.sol{background:linear-gradient(135deg,rgba(245,166,35,0.18),rgba(212,132,90,0.12))}
.hero-banner.parcial{background:linear-gradient(135deg,rgba(91,155,214,0.12),rgba(100,130,180,0.08))}
.hero-banner.nubes,.hero-banner.lluvia{background:linear-gradient(135deg,rgba(80,100,130,0.15),rgba(60,80,110,0.1))}
.hb-title{font-family:'Fraunces',serif;font-size:21px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:4px}
.hb-sub{font-size:13px;color:var(--text2)}
.hb-temp{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-family:'Fraunces',serif;font-size:52px;font-weight:300;color:var(--text);line-height:1}
.hb-temp span{font-size:20px;color:var(--text3)}

.quick-filters{display:flex;gap:8px;padding:12px 12px 4px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.quick-filters::-webkit-scrollbar{display:none}
.qf{background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:7px 14px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.qf.on{background:var(--terra);color:#fff;border-color:var(--terra)}
.list-wrap{flex:1;padding:8px 12px 16px;display:flex;flex-direction:column;gap:10px}

.tcard{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px;cursor:pointer;position:relative;overflow:hidden;transition:transform .12s,border-color .12s;-webkit-user-select:none;user-select:none}
.tcard:active{transform:scale(.98)}
.tcard.soleada{border-color:rgba(245,166,35,0.25)}
.tcard.parcial{border-color:rgba(91,155,214,0.2)}
.tcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.tcard.soleada::before{background:linear-gradient(90deg,#F5A623,#F7BE6A)}
.tcard.parcial::before{background:linear-gradient(90deg,#5B9BD6,#8FC0E8)}
.tcard.sombra::before{background:var(--bg3)}
.tc-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.tc-name{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--text);line-height:1.2;flex:1;margin-right:8px}
.sun-badge{border-radius:20px;padding:4px 9px;font-size:11px;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:4px}
.sun-badge.soleada{background:rgba(245,166,35,0.15);color:#F5C060}
.sun-badge.parcial{background:rgba(91,155,214,0.15);color:#80B8E0}
.sun-badge.sombra{background:rgba(120,120,140,0.15);color:var(--text3)}
.tc-row2{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.obadge{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:500}
.obadge-dot{width:5px;height:5px;border-radius:50%}
.obadge.op .obadge-dot{background:var(--green)}
.obadge.op{color:var(--green)}
.obadge.cl .obadge-dot{background:var(--red)}
.obadge.cl{color:var(--red)}
.tc-meta{font-size:12px;color:var(--text3)}
.tc-row3{background:var(--bg3);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text2)}
.sun-bar-wrap{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.sun-bar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.sun-fill{height:100%;background:linear-gradient(90deg,#F5A623,#F7BE6A);border-radius:3px}
.sb-label{font-size:11px;color:var(--text3)}
.sb-pct{font-size:12px;font-weight:500;color:var(--text2);min-width:28px;text-align:right}
.stars{color:var(--sun);font-size:13px}

.det-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.det-back{display:flex;align-items:center;gap:6px;padding:14px 16px 0;cursor:pointer;font-size:14px;color:var(--terra);font-weight:500}
.det-hero{padding:12px 16px 16px;border-bottom:1px solid var(--border)}
.det-name{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:2px}
.det-sub{font-size:13px;color:var(--text3);margin-bottom:14px}
.verdict-big{border-radius:14px;padding:14px;display:flex;gap:12px;align-items:flex-start}
.verdict-big.buena{background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.2)}
.verdict-big.regular{background:rgba(91,155,214,0.1);border:1px solid rgba(91,155,214,0.2)}
.verdict-big.mala{background:rgba(100,100,120,0.12);border:1px solid rgba(150,150,170,0.15)}
.vb-icon{font-size:30px;flex-shrink:0}
.vb-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:3px}
.vb-text{font-size:13px;color:var(--text2);line-height:1.55}
.det-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.det-stitle{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.det-row:last-child{border-bottom:none}
.det-row-lbl{color:var(--text2)}
.det-row-val{font-weight:500;color:var(--text)}
.tip-item{display:flex;gap:10px;padding:7px 0;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border);align-items:flex-start}
.tip-item:last-child{border-bottom:none}
.tip-icon{font-size:16px;flex-shrink:0;width:22px}
.tag{display:inline-block;background:var(--bg3);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text3);margin:4px 4px 0 0;border:1px solid var(--border)}

/* Mapa estático en detalle */
.loc-map-wrap{width:100%;height:200px;border-radius:14px;overflow:hidden;margin-bottom:10px;border:1px solid var(--border);position:relative;background:var(--bg3)}
.loc-map-wrap iframe{width:100%;height:100%;border:none;display:block}
.btn-primary{width:100%;background:var(--terra);color:#fff;border:none;border-radius:14px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-primary:active{opacity:.85}
.btn-secondary{width:100%;background:var(--bg3);color:var(--text2);border:1px solid var(--border2);border-radius:14px;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}

/* MAPA SCREEN */
.map-screen-inner{display:flex;flex-direction:column;height:100%}
#mapContainer{flex:1;position:relative;background:var(--bg2)}
#gmap{width:100%;height:100%;display:none}
.map-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text2);padding:24px;text-align:center}
.map-list{flex-shrink:0;background:var(--card);border-top:1px solid var(--border);max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.map-titem{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.map-titem:active{background:var(--bg3)}
.map-titem:last-child{border-bottom:none}
.mti-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mti-dot.soleada{background:#F5A623}
.mti-dot.parcial{background:#5B9BD6}
.mti-dot.sombra{background:var(--text3)}
.mti-info{flex:1;min-width:0}
.mti-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mti-meta{font-size:12px;color:var(--text3)}
.mti-go{background:var(--terra);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.apikey-panel{background:var(--card);border-top:1px solid var(--border);padding:12px 16px 14px;flex-shrink:0}
.aklbl{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.ak-row{display:flex;gap:8px;align-items:center}
.ak-row input{flex:1;border:1px solid var(--border2);border-radius:10px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg2);outline:none}
.ak-row input:focus{border-color:var(--terra)}
.ak-row input::placeholder{color:var(--text3)}
.ak-row button{background:var(--terra);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}

.search-hdr{padding:10px 12px;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border2);border-radius:50px;padding:10px 14px}
.search-box input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none}
.search-box input::placeholder{color:var(--text3)}
.btn-loc{background:var(--terra);color:#fff;border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

.empty{text-align:center;padding:48px 24px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.empty-title{font-size:16px;font-weight:500;color:var(--text2)}
.empty-sub{font-size:13px;color:var(--text3)}
.spinner{width:28px;height:28px;border:3px solid var(--bg3);border-top-color:var(--terra);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-title" content="Terrazas">
</head>
<body>
<div id="app">

  <div class="hdr">
    <div class="hdr-logo">
      <div class="logo-sun"></div>
      Terrazas
    </div>
    <button class="w-pill" onclick="toggleSheet()">
      <span class="wi" id="pIcon">&#9728;</span>
      <span class="wt" id="pTemp">--</span>
      <span class="wd" id="pDesc">Valencia</span>
    </button>
  </div>

  <div class="screens">

    <!-- HOME -->
    <div class="screen active" id="s-home">
      <div class="hero-banner sol" id="heroBanner">
        <div class="hb-title" id="heroTitle">Cargando...</div>
        <div class="hb-sub" id="heroSub">Consultando el tiempo</div>
        <div class="hb-temp" id="heroTemp">--<span>°</span></div>
      </div>
      <div class="quick-filters">
        <button class="qf on" onclick="setF('todas',this)">Todas</button>
        <button class="qf" onclick="setF('sol',this)">Con sol</button>
        <button class="qf" onclick="setF('abierto',this)">Abierto</button>
        <button class="qf" onclick="setF('cafe',this)">Café</button>
        <button class="qf" onclick="setF('restaurante',this)">Comer</button>
        <button class="qf" onclick="setF('bar',this)">Bar</button>
      </div>
      <div class="list-wrap" id="homeList">
        <div class="empty"><div class="spinner"></div><div style="font-size:14px;color:var(--text2)">Cargando terrazas...</div></div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="screen" id="s-search">
      <div class="search-hdr">
        <div class="search-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7A6E62" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="sInput" placeholder="Barrio, tipo, nombre..." oninput="doSearch()"/>
          <button class="btn-loc" onclick="getLocation()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          </button>
        </div>
      </div>
      <div class="quick-filters">
        <button class="qf on" onclick="setSF('todas',this)">Todas</button>
        <button class="qf" onclick="setSF('sol',this)">Con sol</button>
        <button class="qf" onclick="setSF('cafe',this)">Café</button>
        <button class="qf" onclick="setSF('restaurante',this)">Comer</button>
        <button class="qf" onclick="setSF('bar',this)">Bar</button>
        <button class="qf" onclick="setSF('abierto',this)">Abierto</button>
      </div>
      <div style="padding:4px 16px 8px;font-size:12px;color:var(--text3)" id="searchCount">10 terrazas</div>
      <div class="list-wrap" id="searchList" style="padding-top:0"></div>
    </div>

    <!-- DETAIL -->
    <div class="screen" id="s-detail">
      <div class="det-scroll" id="detContent"></div>
    </div>

    <!-- MAPA -->
    <div class="screen" id="s-map">
      <div class="map-screen-inner">
        <div id="mapContainer">
          <div class="map-empty" id="mapEmpty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7A6E62" stroke-width="1.4" stroke-linecap="round"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
            <div style="font-size:15px;font-weight:500;color:var(--text2)">Introduce tu API key</div>
            <div style="font-size:13px;color:var(--text3)">para ver el mapa de terrazas</div>
          </div>
          <div id="gmap"></div>
        </div>
        <div class="map-list" id="mapList"></div>
        <div class="apikey-panel">
          <div class="aklbl">Google Maps API Key</div>
          <div class="ak-row">
            <input type="text" id="apiKeyInput" placeholder="AIza..." autocomplete="off" spellcheck="false"/>
            <button onclick="applyApiKey()">Activar</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <nav class="nav">
    <button class="nav-btn active" id="nb-home" onclick="goTo('home')">
      <div class="nav-ico"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></div>
      <span class="nav-lbl">Inicio</span>
    </button>
    <button class="nav-btn" id="nb-search" onclick="goTo('search')">
      <div class="nav-ico"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
      <span class="nav-lbl">Buscar</span>
    </button>
    <button class="nav-btn" id="nb-map" onclick="goTo('map')">
      <div class="nav-ico"><svg viewBox="0 0 24 24"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg></div>
      <span class="nav-lbl">Mapa</span>
    </button>
  </nav>

  <div class="w-sheet-wrap" id="wSheet">
    <div class="w-sheet-bg" onclick="toggleSheet()"></div>
    <div class="w-sheet">
      <div class="sheet-handle"></div>
      <div class="w-hero">
        <div>
          <div class="w-hero-icon" id="wIcon">&#9728;</div>
          <div class="w-hero-desc" id="wDesc">Cielo despejado</div>
        </div>
        <div class="w-hero-temp" id="wTemp">--<span>°C</span></div>
      </div>
      <div class="verdict-strip buena" id="wVerdict">Buen día para terraza</div>
      <div class="w-row">
        <div class="w-cell"><div class="w-cell-lbl">Sensación</div><div class="w-cell-val" id="wFeel">--</div></div>

function wi(c){
  if(c===0) return {ic:"&#9728;",ds:"Cielo despejado",tp:"sol"};
  if(c<=2)  return {ic:"&#9925;",ds:"Parcialmente nublado",tp:"parcial"};
  if(c===3) return {ic:"&#9729;",ds:"Nublado",tp:"nubes"};
  if(c<=49) return {ic:"&#127787;",ds:"Bruma",tp:"nubes"};
  if(c<=79) return {ic:"&#127783;",ds:"Lluvia",tp:"lluvia"};
  if(c<=99) return {ic:"&#9928;",ds:"Tormenta",tp:"lluvia"};
  return {ic:"&#127780;",ds:"Variable",tp:"parcial"};
}

}

function sunAz(){
  var h=new Date().getHours()+new Date().getMinutes()/60;
  if(h<7.5||h>20.5) return null;
  return 90+((h-7.5)/13)*180;
}
function sunExp(o,cloud,tipo){
  if(tipo==='lluvia') return {n:0,txt:'Lluvia',cls:'sombra'};
  var az=sunAz(); if(!az) return {n:0,txt:'Sin sol',cls:'sombra'};
  var om={N:0,NE:45,E:90,SE:135,S:180,SO:225,O:270,NO:315};
  var ta=om[o]||180, diff=Math.abs(az-ta);
  if(diff>180) diff=360-diff;
  var n=Math.round(Math.max(0,1-diff/110)*(1-(cloud||0)/150)*100);
  if(n>=60) return {n:n,txt:'Sol directo',cls:'soleada'};
  if(n>=25) return {n:n,txt:'Sol parcial',cls:'parcial'};
  return {n:n,txt:'A la sombra',cls:'sombra'};
}
function isOp(t){var h=new Date().getHours(); return t.h.c>t.h.a?h>=t.h.a&&h<t.h.c:h>=t.h.a||h<t.h.c;}
function stars(r){var s=''; for(var i=0;i<Math.floor(r);i++) s+='&#9733;'; if(r%1>=.5) s+='½'; for(var i=0;i<5-Math.floor(r)-(r%1>=.5?1:0);i++) s+='&#9734;'; return s;}
function cl(){return W?W.cloud_cover||0:0;}
function tp(){return wi(W?W.weather_code||0:0).tp;}

    +'</div>';
}

function filtered(f,q){

    var sun=sunExp(t.o,cl(),tp()), op=isOp(t);
    if(f==='sol') return mq&&sun.cls==='soleada';
    if(f==='cafe') return mq&&t.t==='cafe';
    if(f==='restaurante') return mq&&t.t==='restaurante';
    if(f==='bar') return mq&&t.t==='bar';
    if(f==='abierto') return mq&&op;
    return mq;
  });
}

/* Mapa con solo el pin, sin ruta */
function loadLocMap(t){
  var wrap=document.getElementById('locMapWrap'); if(!wrap) return;
  if(GKEY){
    /* Google Maps embebido con solo el marcador */
    if(window.google&&window.google.maps){
      wrap.innerHTML='<div id="locMapDiv" style="width:100%;height:100%"></div>';
      var m=new google.maps.Map(document.getElementById('locMapDiv'),{
        center:{lat:t.lat,lng:t.lng}, zoom:16, disableDefaultUI:true,
        styles:[
          {elementType:'geometry',stylers:[{color:'#2A2318'}]},
          {elementType:'labels.text.fill',stylers:[{color:'#B8A898'}]},
          {elementType:'labels.text.stroke',stylers:[{color:'#1E1A14'}]},
          {featureType:'road',elementType:'geometry',stylers:[{color:'#3A3028'}]},
          {featureType:'road.arterial',elementType:'geometry',stylers:[{color:'#42372A'}]},
          {featureType:'water',elementType:'geometry',stylers:[{color:'#1A2A3A'}]},
          {featureType:'poi',stylers:[{visibility:'off'}]},
          {featureType:'transit',stylers:[{visibility:'off'}]}
        ]
      });
      new google.maps.Marker({
        position:{lat:t.lat,lng:t.lng}, map:m, title:t.n,
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:12,fillColor:'#D4845A',fillOpacity:1,strokeColor:'#fff',strokeWeight:2.5}
      });
    } else {
      /* API key guardada pero Maps aún no cargado: usar iframe embed */
      wrap.innerHTML='<iframe src="https://www.google.com/maps/embed/v1/place?key='+GKEY+'&q='+t.lat+','+t.lng+'&zoom=16" allowfullscreen></iframe>';
    }
  } else {
    /* Sin API key: iframe de OpenStreetMap gratuito */
    var delta=0.004;
    var bbox=(t.lng-delta)+','+(t.lat-delta)+','+(t.lng+delta)+','+(t.lat+delta);
    wrap.innerHTML='<iframe src="https://www.openstreetmap.org/export/embed.html?bbox='+bbox+'&layer=mapnik&marker='+t.lat+','+t.lng+'" allowfullscreen></iframe>';
  }
}

/* ---- GOOGLE MAPS (pantalla Mapa) ---- */
function applyApiKey(){
  var k=document.getElementById('apiKeyInput').value.trim();
  if(!k) return;
  GKEY=k; localStorage.setItem('gkey',k); initGoogleMap();
}
function loadSavedKey(){
  var k=localStorage.getItem('gkey');
  if(k){GKEY=k; document.getElementById('apiKeyInput').value=k;}
}
function initGoogleMap(){
  if(!GKEY) return;
  document.getElementById('mapEmpty').style.display='none';
  document.getElementById('gmap').style.display='block';
  if(window.google&&window.google.maps){buildMap();return;}
  var s=document.createElement('script');
  s.src='https://maps.googleapis.com/maps/api/js?key='+GKEY+'&callback=buildMap';
  s.async=true; s.defer=true;
  s.onerror=function(){
    var me=document.getElementById('mapEmpty');
    me.style.display='flex';
    me.innerHTML='<div style="font-size:15px;font-weight:500;color:var(--red)">API key inválida</div><div style="font-size:13px;color:var(--text3)">Comprueba la clave e inténtalo de nuevo</div>';
    document.getElementById('gmap').style.display='none';
  };
  document.head.appendChild(s);
}
window.buildMap=function(){
  gmap=new google.maps.Map(document.getElementById('gmap'),{
    center:{lat:39.4699,lng:-0.3763}, zoom:13, disableDefaultUI:true,
    styles:[
      {elementType:'geometry',stylers:[{color:'#2A2318'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#B8A898'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#1E1A14'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#3A3028'}]},
      {featureType:'road.arterial',elementType:'geometry',stylers:[{color:'#42372A'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#1A2A3A'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]}
    ]
  });
  infoWindow=new google.maps.InfoWindow();
  gmarkers=[];
  DB.forEach(function(t){
    var sun=sunExp(t.o,cl(),tp());
    var color=sun.cls==='soleada'?'#F5A623':sun.cls==='parcial'?'#5B9BD6':'#7A6E62';
    var marker=new google.maps.Marker({
      position:{lat:t.lat,lng:t.lng}, map:gmap, title:t.n,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:color,fillOpacity:1,strokeColor:'#1E1A14',strokeWeight:2}
    });
    marker.addListener('click',function(){
      var op=isOp(t); var s2=sunExp(t.o,cl(),tp());
      infoWindow.setContent(
        '<div style="font-family:DM Sans,sans-serif;padding:4px;min-width:160px">'
        +'<div style="font-weight:600;font-size:14px;margin-bottom:3px">'+t.n+'</div>'
        +'<div style="font-size:12px;color:#888;margin-bottom:6px">'+t.z+'</div>'
        +'<div style="font-size:12px;margin-bottom:8px">'+s2.txt+' · '+(op?'<span style="color:#5DBE7A">Abierto</span>':'<span style="color:#E06060">Cerrado</span>')+'</div>'
        +'<button onclick="showDetailFromMap('+t.id+')" style="background:#D4845A;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-family:inherit;cursor:pointer;width:100%">Ver detalle</button>'
        +'</div>'
      );
      infoWindow.open(gmap,marker);
    });
    gmarkers.push({marker:marker,id:t.id});
  });
  /* Pin de ubicación del usuario */
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(p){
      new google.maps.Marker({
        position:{lat:p.coords.latitude,lng:p.coords.longitude}, map:gmap, title:'Tu ubicación',
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#5B9BD6',fillOpacity:1,strokeColor:'#1E1A14',strokeWeight:2.5}
      });
    });
  }
};
window.showDetailFromMap=function(id){if(infoWindow)infoWindow.close(); showDetail(id);};

function renderMapList(){
  var el=document.getElementById('mapList');
  el.innerHTML=DB.map(function(t){
    var sun=sunExp(t.o,cl(),tp()), op=isOp(t);
    return '<div class="map-titem" onclick="focusMarker('+t.id+')">'
      +'<div class="mti-dot '+sun.cls+'"></div>'
      +'<div class="mti-info"><div class="mti-name">'+t.n+'</div><div class="mti-meta">'+t.z+' · '+(op?'Abierto':'Cerrado')+' · '+sun.txt+'</div></div>'
      +'<button class="mti-go" onclick="event.stopPropagation();showDetail('+t.id+')">Ver</button>'
      +'</div>';
  }).join('');
}
function focusMarker(id){
  if(!gmap) return;
  var t=DB.find(function(x){return x.id===id;});
  if(t) gmap.panTo({lat:t.lat,lng:t.lng});
  var m=gmarkers.find(function(x){return x.id===id;});
  if(m) google.maps.event.trigger(m.marker,'click');
}

function openGMaps(tlat,tlng){
  window.open('https://www.google.com/maps/search/?api=1&query='+tlat+','+tlng,'_blank');
}
function openWaze(tlat,tlng){
  window.open('https://waze.com/ul?ll='+tlat+','+tlng+'&navigate=yes','_blank');
}

function goTo(s){
  document.querySelectorAll('.screen').forEach(function(el){el.classList.remove('active');});
  document.getElementById('s-'+s).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  var nb=document.getElementById('nb-'+s); if(nb) nb.classList.add('active');
  if(s==='search') setTimeout(function(){document.getElementById('sInput').focus();},200);
  if(s==='map'&&GKEY&&!gmap) initGoogleMap();
}
function goBack(){goTo(prevScreen);}
function toggleSheet(){document.getElementById('wSheet').classList.toggle('open');}

function getLocation(){
  if(navigator.geolocation) navigator.geolocation.getCurrentPosition(
    function(p){lat=p.coords.latitude; lon=p.coords.longitude; loadW();},
    function(){}
  );
}

loadSavedKey();
setInterval(loadW,600000);
loadW();
renderMapList();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
</script>
